<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Microsoft SQL Server — Complete Course</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #060b14; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0f172a; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  .module-btn:hover { background: #1e293b !important; }
  .module-btn.active { background: #1d3461 !important; border-color: #3b82f6 !important; }
  .section-toggle:hover { background: #1a2744 !important; }
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ============================================================
   Topics are listed in topics-manifest.json (at the repo root).
   That file is just an array of filenames, e.g.:
   ["topic-01-intro.js", "topic-02-install.js"]
   The order in that array is the order tabs appear in.
   Everything is fetched as a relative path, so this works
   straight out of the box on GitHub Pages — no username/repo
   config needed, and no API rate limits.
   ============================================================ */
async function loadTopics() {
  const manifestRes = await fetch("topics-manifest.json");
  if (!manifestRes.ok) {
    throw new Error("Could not load topics-manifest.json. Make sure it exists at the repo root.");
  }
  const filenames = await manifestRes.json();

  const topics = await Promise.all(
    filenames.map(async (name) => {
      const res = await fetch(`topics/${name}`);
      if (!res.ok) {
        throw new Error(`Could not load topics/${name}`);
      }
      const text = await res.text();
      try {
        // eslint-disable-next-line no-eval
        return eval("(" + text + ")");
      } catch (e) {
        throw new Error(`Could not parse topics/${name}: ${e.message}`);
      }
    })
  );
  return topics;
}

const CodeBlock = ({ code }) => {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(code);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };
  return (
    <div style={{ position: "relative", marginTop: "12px", marginBottom: "4px" }}>
      <button
        onClick={handleCopy}
        style={{
          position: "absolute", top: "10px", right: "10px",
          background: copied ? "#22c55e22" : "#ffffff18",
          border: `1px solid ${copied ? "#22c55e66" : "#ffffff30"}`,
          color: copied ? "#22c55e" : "#94a3b8",
          padding: "3px 10px", borderRadius: "5px",
          fontSize: "11px", cursor: "pointer", fontFamily: "inherit",
          transition: "all 0.2s",
        }}
      >{copied ? "✓ Copied" : "Copy"}</button>
      <pre style={{
        background: "#0d1117",
        border: "1px solid #30363d",
        borderRadius: "8px",
        padding: "16px",
        overflowX: "auto",
        margin: 0,
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Courier New', monospace",
        fontSize: "13px",
        lineHeight: "1.7",
        color: "#e6edf3",
      }}>
        <code dangerouslySetInnerHTML={{
          __html: code
            .replace(/--[^\n]*/g, m => `<span style="color:#8b949e">${m}</span>`)
            .replace(/\b(SELECT|FROM|WHERE|INSERT|INTO|VALUES|CREATE|DATABASE|TABLE|USE|DROP|ALTER|UPDATE|DELETE|ORDER|GROUP|BY|HAVING|AND|OR|NOT|IN|LIKE|BETWEEN|AS|TOP|DISTINCT|IS|NULL|CASE|WHEN|THEN|ELSE|END|PERCENT|UNIQUE|DEFAULT|PRIMARY|KEY|IDENTITY|REFERENCES|ON|JOIN|INNER|LEFT|RIGHT|FULL|OUTER|CROSS|SET|ADD|COLUMN|CONSTRAINT|ASC|DESC|WITH)\b/g,
              m => `<span style="color:#ff7b72">${m}</span>`)
            .replace(/\b(INT|VARCHAR|NVARCHAR|DECIMAL|FLOAT|DATE|DATETIME|BIT|CHAR|BIGINT|SMALLINT|TINYINT|MONEY|TEXT|NTEXT|IMAGE|VARBINARY)\b/g,
              m => `<span style="color:#79c0ff">${m}</span>`)
            .replace(/\b(COUNT|SUM|AVG|MIN|MAX|UPPER|LOWER|LEN|CONCAT|SUBSTRING|REPLACE|LTRIM|RTRIM|YEAR|MONTH|DAY|GETDATE|DATEDIFF|DATEADD|FORMAT|ISNULL|COALESCE|NULLIF|DB_NAME)\b/g,
              m => `<span style="color:#d2a8ff">${m}</span>`)
            .replace(/'[^']*'/g, m => `<span style="color:#a5d6ff">${m}</span>`)
            .replace(/\b(\d+(\.\d+)?)\b/g, m => `<span style="color:#79c0ff">${m}</span>`)
        }} />
      </pre>
    </div>
  );
};

const DataTable = ({ headers, rows }) => (
  <div style={{ overflowX: "auto", marginTop: "12px" }}>
    <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "13.5px" }}>
      <thead>
        <tr>
          {headers.map((h, i) => (
            <th key={i} style={{
              background: "#1e293b", color: "#94a3b8",
              padding: "9px 14px", textAlign: "left",
              fontWeight: "600", fontSize: "12px",
              textTransform: "uppercase", letterSpacing: "0.05em",
              border: "1px solid #334155",
              borderTop: "2px solid #3b82f6",
            }}>{h}</th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((row, ri) => (
          <tr key={ri} style={{ background: ri % 2 === 0 ? "#0f172a" : "#111827" }}>
            {row.map((cell, ci) => (
              <td key={ci} style={{
                padding: "9px 14px", border: "1px solid #1e293b",
                color: ci === 0 ? "#e2e8f0" : "#94a3b8",
                fontFamily: ci === 0 ? "'JetBrains Mono', monospace" : "inherit",
                fontSize: ci === 0 ? "12.5px" : "13.5px",
              }}>{cell}</td>
            ))}
          </tr>
        ))}
      </tbody>
    </table>
  </div>
);

const renderBullet = (text) => {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((p, i) => i % 2 === 1 ? <strong key={i} style={{ color: "#e2e8f0" }}>{p}</strong> : p);
};

/* Change this PIN to whatever you want students/viewers to enter
   before an answer is revealed. */
const PRACTICE_PIN = "1234";

const AnswerReveal = ({ code }) => {
  const [revealed, setRevealed] = useState(false);
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (pin === PRACTICE_PIN) {
      setRevealed(true);
      setError(false);
    } else {
      setError(true);
    }
  };

  if (revealed) {
    return <CodeBlock code={code} />;
  }

  return (
    <form onSubmit={handleSubmit} style={{ marginTop: "12px", display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
      <input
        type="password"
        inputMode="numeric"
        placeholder="Enter PIN"
        value={pin}
        onChange={(e) => { setPin(e.target.value); setError(false); }}
        style={{
          background: "#0d1117", border: `1px solid ${error ? "#f87171" : "#30363d"}`,
          color: "#e6edf3", padding: "8px 12px", borderRadius: "6px",
          fontSize: "13px", fontFamily: "inherit", width: "120px",
        }}
      />
      <button type="submit" style={{
        background: "#1d3461", border: "1px solid #3b82f6", color: "#93c5fd",
        padding: "8px 14px", borderRadius: "6px", fontSize: "13px",
        cursor: "pointer", fontFamily: "inherit",
      }}>🔒 Reveal Answer</button>
      {error && <span style={{ color: "#f87171", fontSize: "12px" }}>Incorrect PIN</span>}
    </form>
  );
};

function App() {
  const [course, setCourse] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [activeModule, setActiveModule] = useState(0);
  const [expandedSections, setExpandedSections] = useState({});

  useEffect(() => {
    loadTopics()
      .then(topics => { setCourse(topics); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, []);

  const toggleSection = (key) => {
    setExpandedSections(prev => ({ ...prev, [key]: !prev[key] }));
  };

  const wrapperStyle = {
    minHeight: "100vh",
    background: "#060b14",
    fontFamily: "'IBM Plex Sans', 'Segoe UI', sans-serif",
    color: "#cbd5e1",
    display: "flex",
    flexDirection: "column",
  };

  if (loading) {
    return (
      <div style={{ ...wrapperStyle, alignItems: "center", justifyContent: "center" }}>
        <div className="spin" style={{
          width: "32px", height: "32px", borderRadius: "50%",
          border: "3px solid #1e293b", borderTopColor: "#3b82f6",
        }} />
        <p style={{ marginTop: "16px", color: "#64748b", fontSize: "14px" }}>Loading topics…</p>
      </div>
    );
  }

  if (error) {
    return (
      <div style={{ ...wrapperStyle, alignItems: "center", justifyContent: "center", padding: "24px", textAlign: "center" }}>
        <p style={{ color: "#f87171", fontSize: "15px", maxWidth: "480px" }}>⚠️ {error}</p>
      </div>
    );
  }

  if (course.length === 0) {
    return (
      <div style={{ ...wrapperStyle, alignItems: "center", justifyContent: "center" }}>
        <p style={{ color: "#64748b", fontSize: "14px" }}>No topics found yet. Add a .js file to the /topics folder.</p>
      </div>
    );
  }

  const module = course[activeModule];

  return (
    <div style={wrapperStyle}>
      <div style={{
        background: "linear-gradient(135deg, #0c1929 0%, #0f2644 50%, #071520 100%)",
        borderBottom: "1px solid #1e3a5f",
      }}>
        <div style={{ maxWidth: "1100px", margin: "0 auto", padding: "28px 24px 24px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "14px", marginBottom: "6px" }}>
            <div style={{
              background: "linear-gradient(135deg, #cc0000, #ff4444)",
              borderRadius: "10px", padding: "8px 12px",
              fontSize: "22px", lineHeight: 1,
            }}>🗃️</div>
            <div>
              <div style={{ fontSize: "11px", color: "#3b82f6", fontWeight: "600", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: "3px" }}>
                Complete Course
              </div>
              <h1 style={{ margin: 0, fontSize: "24px", fontWeight: "700", color: "#f1f5f9", lineHeight: 1.2 }}>
                Microsoft SQL Server
              </h1>
            </div>
          </div>
          <p style={{ margin: "10px 0 0 0", color: "#64748b", fontSize: "14px" }}>
            From zero to writing confident SQL queries — with real examples and explanations.
          </p>
        </div>

        <div style={{ display: "flex", gap: "0", overflowX: "auto", padding: "0 24px", maxWidth: "1100px", margin: "0 auto" }}>
          {course.map((m, i) => (
            <button
              key={i}
              className={`module-btn${activeModule === i ? " active" : ""}`}
              onClick={() => setActiveModule(i)}
              style={{
                background: activeModule === i ? "#1d3461" : "transparent",
                border: "none",
                borderBottom: activeModule === i ? "2px solid #3b82f6" : "2px solid transparent",
                color: activeModule === i ? "#93c5fd" : "#64748b",
                padding: "12px 18px 14px",
                cursor: "pointer",
                fontSize: "13px",
                fontWeight: activeModule === i ? "600" : "400",
                whiteSpace: "nowrap",
                transition: "all 0.2s",
                fontFamily: "inherit",
                display: "flex", alignItems: "center", gap: "7px",
              }}
            >
              <span>{m.icon}</span>
              {m.title}
            </button>
          ))}
        </div>
      </div>

      <div style={{ maxWidth: "1100px", margin: "0 auto", width: "100%", padding: "32px 24px 60px" }}>
        <div style={{ marginBottom: "28px", display: "flex", alignItems: "center", gap: "12px" }}>
          <span style={{
            background: "#1d3461", color: "#3b82f6",
            fontSize: "11px", fontWeight: "700", padding: "4px 10px",
            borderRadius: "20px", letterSpacing: "0.08em", textTransform: "uppercase",
          }}>Module {module.id}</span>
          <h2 style={{ margin: 0, fontSize: "22px", fontWeight: "700", color: "#f1f5f9" }}>
            {module.icon} {module.title}
          </h2>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
          {module.sections.map((section, si) => {
            const key = `${activeModule}-${si}`;
            const isOpen = expandedSections[key] !== false;
            return (
              <div key={si} style={{
                background: "#0c1524",
                border: "1px solid #1e293b",
                borderRadius: "12px",
                overflow: "hidden",
              }}>
                <button
                  className="section-toggle"
                  onClick={() => toggleSection(key)}
                  style={{
                    width: "100%", textAlign: "left", background: "transparent",
                    border: "none", cursor: "pointer", padding: "18px 22px",
                    display: "flex", alignItems: "center", justifyContent: "space-between",
                    color: "#e2e8f0", fontFamily: "inherit",
                    borderBottom: isOpen ? "1px solid #1e293b" : "none",
                    transition: "background 0.15s",
                  }}
                >
                  <span style={{ fontSize: "16px", fontWeight: "600", display: "flex", alignItems: "center", gap: "10px" }}>
                    <span style={{
                      background: "#1d3461", color: "#60a5fa",
                      width: "26px", height: "26px", borderRadius: "6px",
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      fontSize: "12px", fontWeight: "700", flexShrink: 0,
                    }}>{si + 1}</span>
                    {section.heading}
                  </span>
                  <span style={{ color: "#475569", fontSize: "18px", transform: isOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</span>
                </button>

                {isOpen && (
                  <div style={{ padding: "20px 22px 22px" }}>
                    {section.content && (
                      <p style={{ margin: "0 0 18px 0", lineHeight: "1.75", color: "#94a3b8", fontSize: "14.5px" }}>
                        {section.content}
                      </p>
                    )}

                    {section.subsections && section.subsections.map((sub, ssi) => (
                      <div key={ssi} style={{ marginBottom: ssi < section.subsections.length - 1 ? "22px" : "0" }}>
                        <h4 style={{
                          margin: "0 0 10px 0", fontSize: "13px",
                          fontWeight: "600", color: "#60a5fa",
                          textTransform: "uppercase", letterSpacing: "0.08em",
                          display: "flex", alignItems: "center", gap: "8px",
                        }}>
                          <span style={{ width: "3px", height: "14px", background: "#3b82f6", borderRadius: "2px", display: "inline-block" }} />
                          {sub.title}
                        </h4>

                        {sub.code && <CodeBlock code={sub.code} />}
                        {sub.answer && <AnswerReveal code={sub.answer} />}
                        {sub.table && <DataTable headers={sub.table.headers} rows={sub.table.rows} />}

                        {sub.bullets && (
                          <ul style={{ margin: "8px 0 0 0", padding: "0", listStyle: "none" }}>
                            {sub.bullets.map((b, bi) => (
                              <li key={bi} style={{
                                padding: "6px 0 6px 20px",
                                position: "relative",
                                color: "#94a3b8",
                                fontSize: "14px",
                                lineHeight: "1.65",
                                borderBottom: bi < sub.bullets.length - 1 ? "1px solid #0f1a2e" : "none",
                              }}>
                                <span style={{
                                  position: "absolute", left: "0", top: "11px",
                                  width: "6px", height: "6px", borderRadius: "50%",
                                  background: "#3b82f6", display: "inline-block",
                                }} />
                                {renderBullet(b)}
                              </li>
                            ))}
                          </ul>
                        )}

                        {sub.numbered && (
                          <ol style={{ margin: "8px 0 0 0", padding: "0 0 0 22px" }}>
                            {sub.numbered.map((n, ni) => (
                              <li key={ni} style={{
                                padding: "5px 0",
                                color: "#94a3b8",
                                fontSize: "14px",
                                lineHeight: "1.65",
                              }}>
                                {renderBullet(n)}
                              </li>
                            ))}
                          </ol>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: "32px" }}>
          <button
            onClick={() => setActiveModule(m => Math.max(0, m - 1))}
            disabled={activeModule === 0}
            style={{
              background: activeModule === 0 ? "#0c1524" : "#1e293b",
              border: "1px solid #1e293b",
              color: activeModule === 0 ? "#334155" : "#94a3b8",
              padding: "10px 20px", borderRadius: "8px",
              cursor: activeModule === 0 ? "not-allowed" : "pointer",
              fontSize: "13px", fontFamily: "inherit",
            }}
          >← Previous Module</button>
          <div style={{ color: "#334155", fontSize: "13px", display: "flex", alignItems: "center" }}>
            {activeModule + 1} / {course.length}
          </div>
          <button
            onClick={() => setActiveModule(m => Math.min(course.length - 1, m + 1))}
            disabled={activeModule === course.length - 1}
            style={{
              background: activeModule === course.length - 1 ? "#0c1524" : "#1d3461",
              border: `1px solid ${activeModule === course.length - 1 ? "#1e293b" : "#3b82f6"}`,
              color: activeModule === course.length - 1 ? "#334155" : "#93c5fd",
              padding: "10px 20px", borderRadius: "8px",
              cursor: activeModule === course.length - 1 ? "not-allowed" : "pointer",
              fontSize: "13px", fontFamily: "inherit",
            }}
          >Next Module →</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
